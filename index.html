<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 12 Web OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #0078d4;
    --glass-border: rgba(255,255,255,0.15);
    --glass-hover: rgba(255,255,255,0.15);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.6);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --window-bg: rgba(20,20,32,0.95);
  }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden; background: #000; color: var(--text); user-select: none;
  }
  .win12-container {
    width: 100vw; height: 100vh; position: relative; overflow: hidden;
    background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
  }
  .desktop {
    position: absolute; top: 0; left: 0; right: 0; bottom: 48px;
    padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap;
    align-content: flex-start; gap: 12px;
  }
  .desktop-icon {
    width: 88px; display: flex; flex-direction: column;
    align-items: center; gap: 6px; padding: 8px 4px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .desktop-icon:hover { background: var(--glass-hover); }
  .desktop-icon .ico {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
  }
  .desktop-icon span { font-size: 11px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); text-align: center; }

  /* Taskbar */
  .taskbar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
    background: rgba(15,15,25,0.8); backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; z-index: 9999;
  }
  .taskbar-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
  .taskbar-btn {
    width: 40px; height: 40px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; position: relative;
  }
  .taskbar-btn:hover { background: var(--glass-hover); }
  .start-btn { background: linear-gradient(135deg, var(--accent), #005a9e); color: white; border-radius: 8px; }
  
  /* Running taskbar indicator dot & active state */
  .taskbar-btn.running::after {
    content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px;
    background: var(--text); border-radius: 50%;
  }
  .taskbar-btn.active { background: var(--glass-hover); }

  /* Window Engine */
  .window {
    position: absolute; background: var(--window-bg);
    backdrop-filter: blur(30px); border-radius: 12px;
    border: 1px solid var(--glass-border); box-shadow: var(--shadow);
    display: none; flex-direction: column; overflow: hidden;
    min-width: 300px; min-height: 200px;
  }
  .window.open { display: flex; }
  .window.maximized {
    top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 48px) !important;
    border-radius: 0;
  }
  .win-titlebar {
    height: 38px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 12px;
    background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--glass-border);
    cursor: grab;
  }
  .win-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
  .win-controls { display: flex; align-items: center; gap: 6px; }
  .win-btn {
    width: 24px; height: 24px; border-radius: 4px; display: flex;
    align-items: center; justify-content: center; font-size: 12px;
    cursor: pointer; background: rgba(255,255,255,0.05); color: var(--text-dim);
  }
  .win-btn:hover { background: var(--glass-hover); color: #fff; }
  .win-btn.close:hover { background: #e81123; color: #fff; }
  .win-content { flex: 1; padding: 0; overflow: hidden; position: relative; }

  /* Store */
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; padding: 16px; }
  .store-card {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 8px;
  }
  .store-btn {
    padding: 6px 14px; border-radius: 6px; border: none;
    background: var(--accent); color: white; font-weight: 600; cursor: pointer; font-size: 12px;
  }

  /* Apps Layout */
  .spotify-app { background: #121212; height: 100%; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; }
  .sp-cover { width: 130px; height: 130px; background: linear-gradient(135deg, #1db954, #191414); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .sp-controls { display: flex; gap: 16px; align-items: center; margin-top: 8px; }
  .sp-btn { background: #1db954; border: none; width: 44px; height: 44px; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; }

  .vscode-app { display: flex; height: 100%; }
  .code-input { width: 50%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 12px; font-family: monospace; outline: none; border-right: 1px solid var(--glass-border); }
  .code-preview { width: 50%; height: 100%; background: #fff; border: none; }

  .gd-app { width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { background: #111; border: 1px solid var(--glass-border); border-radius: 8px; }

  /* Chrome Browser Styling */
  .browser-container { display: flex; flex-direction: column; height: 100%; background: #1e1e1e; }
  .browser-bar { padding: 8px; background: rgba(0,0,0,0.3); display: flex; gap: 8px; border-bottom: 1px solid var(--glass-border); }
  .browser-input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.08); color: white; outline: none; font-size: 13px; }
  .browser-btn { padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  .browser-iframe { flex: 1; border: none; width: 100%; background: #fff; }

  /* YouTube App Styling */
  .yt-container { display: flex; flex-direction: column; height: 100%; background: #0f0f0f; color: white; }
  .yt-header { display: flex; padding: 12px; gap: 8px; border-bottom: 1px solid #272727; }
  .yt-search-input { flex: 1; padding: 8px 16px; border-radius: 20px; border: 1px solid #303030; background: #121212; color: white; outline: none; }
  .yt-search-btn { padding: 8px 20px; border-radius: 20px; background: #222; border: 1px solid #303030; color: white; cursor: pointer; }
  .yt-search-btn:hover { background: #303030; }
  .yt-body { display: flex; flex: 1; overflow: hidden; }
  .yt-sidebar { width: 280px; overflow-y: auto; padding: 12px; border-right: 1px solid #272727; display: flex; flex-direction: column; gap: 12px; }
  .yt-result-card { display: flex; flex-direction: column; gap: 8px; cursor: pointer; border-radius: 8px; transition: background 0.2s; padding: 8px; }
  .yt-result-card:hover { background: #272727; }
  .yt-thumb { width: 100%; border-radius: 8px; aspect-ratio: 16/9; object-fit: cover; }
  .yt-title { font-size: 14px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .yt-channel { font-size: 12px; color: #aaa; }
  .yt-player-area { flex: 1; background: #000; display: flex; flex-direction: column; }
</style>
</head>
<body>

<div class="win12-container">
  <div class="desktop" id="desktop"></div>

  <!-- Microsoft Store Window -->
  <div class="window" id="win-store" style="width:720px; height:500px;" onmousedown="focusAppWindow('store')">
    <div class="win-titlebar">
      <div class="win-title"><span>🛍️</span> Microsoft Store</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('store')">-</div>
        <div class="win-btn" onclick="toggleMaximize('store')">□</div>
        <div class="win-btn close" onclick="closeWindow('store')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="store-grid" id="store-catalog"></div>
    </div>
  </div>

  <!-- Spotify Endless App -->
  <div class="window" id="win-spotify" style="width:380px; height:430px;" onmousedown="focusAppWindow('spotify')">
    <div class="win-titlebar">
      <div class="win-title"><span>🎵</span> Spotify (Endless Playback)</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('spotify')">-</div>
        <div class="win-btn" onclick="toggleMaximize('spotify')">□</div>
        <div class="win-btn close" onclick="closeWindow('spotify')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="spotify-app">
        <div class="sp-cover">🎧</div>
        <h3 id="sp-title">Synthwave Chill</h3>
        <p style="font-size:12px; color:var(--text-dim);" id="sp-artist">Endless Playlist</p>
        <audio id="audio-player" onended="nextTrack()"></audio>
        <div class="sp-controls">
          <button class="sp-btn" onclick="prevTrack()">⏮</button>
          <button class="sp-btn" id="play-btn" onclick="toggleAudio()">▶</button>
          <button class="sp-btn" onclick="nextTrack()">⏭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Geometry Dash App -->
  <div class="window" id="win-gd" style="width:520px; height:400px;" onmousedown="focusAppWindow('gd')">
    <div class="win-titlebar">
      <div class="win-title"><span>🟩</span> Geometry Dash</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('gd')">-</div>
        <div class="win-btn" onclick="toggleMaximize('gd')">□</div>
        <div class="win-btn close" onclick="closeWindow('gd')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="gd-app">
        <div style="font-size:12px; color:var(--text-dim); margin-bottom:4px;">Press SPACE / UP / CLICK to Jump!</div>
        <canvas id="gdCanvas" width="480" height="300"></canvas>
      </div>
    </div>
  </div>

  <!-- VS Code App -->
  <div class="window" id="win-vscode" style="width:700px; height:450px;" onmousedown="focusAppWindow('vscode')">
    <div class="win-titlebar">
      <div class="win-title"><span>💙</span> VS Code</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('vscode')">-</div>
        <div class="win-btn" onclick="toggleMaximize('vscode')">□</div>
        <div class="win-btn close" onclick="closeWindow('vscode')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="vscode-app">
        <textarea class="code-input" id="code-editor" oninput="updateCodePreview()" spellcheck="false"><h1 style="color:#0078d4; font-family:sans-serif;">Live Code Editor</h1>
<p>Type HTML, CSS, or JS here live!</p>
<button onclick="alert('Working!')">Run Test</button></textarea>
        <iframe class="code-preview" id="code-preview"></iframe>
      </div>
    </div>
  </div>

  <!-- YouTube App -->
  <div class="window" id="win-youtube" style="width:850px; height:550px;" onmousedown="focusAppWindow('youtube')">
    <div class="win-titlebar">
      <div class="win-title"><span>▶️</span> YouTube</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('youtube')">-</div>
        <div class="win-btn" onclick="toggleMaximize('youtube')">□</div>
        <div class="win-btn close" onclick="closeWindow('youtube')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="yt-container">
        <div class="yt-header">
          <input type="text" class="yt-search-input" id="yt-search-box" placeholder="Search YouTube..." onkeydown="if(event.key==='Enter') searchYouTube()">
          <button class="yt-search-btn" onclick="searchYouTube()">Search</button>
        </div>
        <div class="yt-body">
          <div class="yt-sidebar" id="yt-results">
            <div style="text-align:center; color:#aaa; margin-top:20px;">Search for a video or live stream!</div>
          </div>
          <div class="yt-player-area">
            <iframe id="yt-player" src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ" style="width:100%; height:100%; border:none;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chrome Browser App -->
  <div class="window" id="win-chrome" style="width:780px; height:500px;" onmousedown="focusAppWindow('chrome')">
    <div class="win-titlebar">
      <div class="win-title"><span>🌐</span> Chrome Browser</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('chrome')">-</div>
        <div class="win-btn" onclick="toggleMaximize('chrome')">□</div>
        <div class="win-btn close" onclick="closeWindow('chrome')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <div class="browser-container">
        <div class="browser-bar">
          <input type="text" class="browser-input" id="browser-url" value="https://wikipedia.org" onkeydown="if(event.key==='Enter') navigateBrowser()" />
          <button class="browser-btn" onclick="navigateBrowser()">Go</button>
        </div>
        <iframe class="browser-iframe" id="browser-frame" src="/api/proxy?url=https://wikipedia.org"></iframe>
      </div>
    </div>
  </div>

  <!-- Notepad App -->
  <div class="window" id="win-notepad" style="width:400px; height:300px;" onmousedown="focusAppWindow('notepad')">
    <div class="win-titlebar">
      <div class="win-title"><span>📝</span> Notepad</div>
      <div class="win-controls">
        <div class="win-btn" onclick="minimizeWindow('notepad')">-</div>
        <div class="win-btn" onclick="toggleMaximize('notepad')">□</div>
        <div class="win-btn close" onclick="closeWindow('notepad')">✕</div>
      </div>
    </div>
    <div class="win-content">
      <textarea style="width:100%; height:100%; background:#1e1e1e; color:#fff; padding:12px; border:none; outline:none;" placeholder="Type notes here..."></textarea>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="taskbar-center" id="taskbar-apps">
      <div class="taskbar-btn start-btn" title="Start Menu">✶</div>
    </div>
  </div>
</div>

<script>
  // ==============================================
  // YOUTUBE API KEY INSERTED
  // ==============================================
  const YOUTUBE_API_KEY = "AIzaSyAYB2OcA499t3O83fy5IZjI6zP-1ktFnRw"; 
  // ==============================================

  const catalog = [
    { id: 'youtube', name: 'YouTube', icon: '▶️', desc: 'Search and watch videos.' },
    { id: 'chrome', name: 'Chrome Browser', icon: '🌐', desc: 'Proxy browser engine.' },
    { id: 'vscode', name: 'VS Code', icon: '💙', desc: 'Live HTML editor.' },
    { id: 'gd', name: 'Geometry Dash', icon: '🟩', desc: 'Jump over spikes!' },
    { id: 'spotify', name: 'Spotify Music', icon: '🎵', desc: 'Endless song player.' },
    { id: 'notepad', name: 'Notepad', icon: '📝', desc: 'Simple text editor.' }
  ];

  let systemApps = { store: { id: 'store', name: 'Microsoft Store', icon: '🛍️' } };
  let runningApps = new Set();
  let zIndex = 100;

  window.addEventListener('DOMContentLoaded', () => {
    renderDesktop();
    renderStoreCatalog();
    updateCodePreview();
    initSpotify();
    initGDGame();
    renderTaskbarIcons();
  });

  function renderStoreCatalog() {
    document.getElementById('store-catalog').innerHTML = catalog.map(app => {
      const installed = systemApps[app.id];
      return `
        <div class="store-card">
          <div style="font-size:28px;">${app.icon}</div>
          <strong>${app.name}</strong>
          <p style="font-size:11px; color:var(--text-dim);">${app.desc}</p>
          <button class="store-btn" onclick="installApp('${app.id}')">${installed ? 'Open' : 'Install'}</button>
        </div>
      `;
    }).join('');
  }

  function installApp(id) {
    const app = catalog.find(c => c.id === id);
    systemApps[id] = app;
    renderDesktop();
    renderStoreCatalog();
    openApp(id);
  }

  function renderDesktop() {
    document.getElementById('desktop').innerHTML = Object.keys(systemApps).map(id => `
      <div class="desktop-icon" onclick="openApp('${id}')">
        <div class="ico">${systemApps[id].icon}</div>
        <span>${systemApps[id].name}</span>
      </div>
    `).join('');
  }

  function renderTaskbarIcons() {
    const taskbarCenter = document.getElementById('taskbar-apps');
    let html = `<div class="taskbar-btn start-btn" title="Start Menu">✶</div>`;
    
    runningApps.forEach(id => {
      const app = catalog.find(c => c.id === id) || systemApps[id];
      if (app) {
        const win = document.getElementById(`win-${id}`);
        const isOpen = win && win.classList.contains('open');
        const isTop = win && parseInt(win.style.zIndex || 0) === zIndex;
        
        html += `
          <div class="taskbar-btn running ${isOpen && isTop ? 'active' : ''}" onclick="toggleAppWindow('${id}')" title="${app.name}">
            ${app.icon}
          </div>
        `;
      }
    });
    taskbarCenter.innerHTML = html;
  }

  /* Window Management Engine */
  function openApp(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) {
      win.classList.add('open');
      if (!win.style.left) { win.style.left = '120px'; win.style.top = '60px'; }
      win.style.zIndex = ++zIndex;
      runningApps.add(id);
      renderTaskbarIcons();
    }
  }

  function focusAppWindow(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) {
      win.style.zIndex = ++zIndex;
      renderTaskbarIcons();
    }
  }

  function toggleAppWindow(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) {
      if (win.classList.contains('open')) {
        if (parseInt(win.style.zIndex) === zIndex) {
          win.classList.remove('open');
          renderTaskbarIcons();
        } else {
          win.style.zIndex = ++zIndex;
          renderTaskbarIcons();
        }
      } else {
        win.classList.add('open');
        win.style.zIndex = ++zIndex;
        renderTaskbarIcons();
      }
    }
  }

  function closeWindow(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) win.classList.remove('open');
    if (id === 'spotify') document.getElementById('audio-player').pause();
    runningApps.delete(id);
    renderTaskbarIcons();
  }

  function minimizeWindow(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) win.classList.remove('open');
    renderTaskbarIcons();
  }

  function toggleMaximize(id) {
    const win = document.getElementById(`win-${id}`);
    if (win) win.classList.toggle('maximized');
  }

  /* YouTube Search Engine */
  async function searchYouTube() {
    const query = document.getElementById('yt-search-box').value;
    if (!query) return;
    
    const resultsDiv = document.getElementById('yt-results');
    resultsDiv.innerHTML = '<div style="text-align:center; padding:20px;">Searching...</div>';

    try {
      const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
      const data = await response.json();

      if (data.items && data.items.length > 0) {
        resultsDiv.innerHTML = data.items.map(item => `
          <div class="yt-result-card" onclick="playYouTubeVideo('${item.id.videoId}')">
            <img class="yt-thumb" src="${item.snippet.thumbnails.medium.url}" alt="thumbnail">
            <div>
              <div class="yt-title">${item.snippet.title}</div>
              <div class="yt-channel">${item.snippet.channelTitle}</div>
            </div>
          </div>
        `).join('');
      } else {
        resultsDiv.innerHTML = '<div style="text-align:center; padding:20px;">No results found.</div>';
      }
    } catch (err) {
      resultsDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#ff4444;">Error searching. Did you add your API key?</div>';
    }
  }

  function playYouTubeVideo(videoId) {
    document.getElementById('yt-player').src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
  }

  /* Chrome Proxy Browser Navigator */
  function navigateBrowser() {
    let url = document.getElementById('browser-url').value.trim();
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      url = 'https://' + url;
    }
    document.getElementById('browser-url').value = url;
    document.getElementById('browser-frame').src = '/api/proxy?url=' + encodeURIComponent(url);
  }

  /* Spotify Endless Playlist Engine */
  const playlist = [
    { title: 'Synthwave Chill', artist: 'Track 01', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
    { title: 'Electro Beat', artist: 'Track 02', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
    { title: 'Ambient Pulse', artist: 'Track 03', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' }
  ];
  let currentSong = 0;

  function initSpotify() {
    loadSong(currentSong);
  }

  function loadSong(index) {
    const player = document.getElementById('audio-player');
    player.src = playlist[index].url;
    document.getElementById('sp-title').innerText = playlist[index].title;
    document.getElementById('sp-artist').innerText = playlist[index].artist;
  }

  function toggleAudio() {
    const player = document.getElementById('audio-player');
    const btn = document.getElementById('play-btn');
    if (player.paused) { player.play(); btn.innerText = '⏸'; }
    else { player.pause(); btn.innerText = '▶'; }
  }

  function nextTrack() {
    currentSong = (currentSong + 1) % playlist.length;
    loadSong(currentSong);
    document.getElementById('audio-player').play();
    document.getElementById('play-btn').innerText = '⏸';
  }

  function prevTrack() {
    currentSong = (currentSong - 1 + playlist.length) % playlist.length;
    loadSong(currentSong);
    document.getElementById('audio-player').play();
    document.getElementById('play-btn').innerText = '⏸';
  }

  /* VS Code Live Editor */
  function updateCodePreview() {
    const code = document.getElementById('code-editor').value;
    const preview = document.getElementById('code-preview').contentWindow.document;
    preview.open(); preview.write(code); preview.close();
  }

  /* Geometry Dash Playable Engine */
  function initGDGame() {
    const canvas = document.getElementById('gdCanvas');
    const ctx = canvas.getContext('2d');
    let cube = { x: 60, y: 220, size: 24, dy: 0, grounded: false, rotation: 0 };
    let obstacles = [{ x: 500, w: 20, h: 30 }];
    let speed = 4;
    let score = 0;

    function jump() {
      if (cube.grounded) { cube.dy = -9; cube.grounded = false; }
    }

    window.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'ArrowUp') jump(); });
    canvas.addEventListener('click', jump);

    function gameLoop() {
      cube.dy += 0.55; cube.y += cube.dy;
      if (cube.y >= 226) { cube.y = 226; cube.grounded = true; cube.rotation = 0; }
      else { cube.rotation += 8; }

      obstacles.forEach(obs => {
        obs.x -= speed;
        if (obs.x < -30) {
          obs.x = canvas.width + Math.random() * 150;
          score++;
        }
        if (cube.x < obs.x + obs.w && cube.x + cube.size > obs.x &&
            cube.y < 250 && cube.y + cube.size > 250 - obs.h) {
          cube.y = 226; score = 0; obs.x = canvas.width + 100;
        }
      });

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#00ffcc'; ctx.fillRect(0, 250, canvas.width, 50);

      ctx.save();
      ctx.translate(cube.x + 12, cube.y + 12);
      ctx.rotate((cube.rotation * Math.PI) / 180);
      ctx.fillStyle = '#ff0055'; ctx.fillRect(-12, -12, cube.size, cube.size);
      ctx.restore();

      ctx.fillStyle = '#ffcc00';
      obstacles.forEach(obs => {
        ctx.beginPath();
        ctx.moveTo(obs.x, 250);
        ctx.lineTo(obs.x + obs.w / 2, 250 - obs.h);
        ctx.lineTo(obs.x + obs.w, 250);
        ctx.fill();
      });

      ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif';
      ctx.fillText(`Score: ${score}`, 16, 26);

      requestAnimationFrame(gameLoop);
    }
    gameLoop();
  }

  /* Drag Window Setup */
  document.querySelectorAll('.win-titlebar').forEach(bar => {
    let dragged = null, ox = 0, oy = 0;
    bar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('win-btn')) return;
      dragged = bar.closest('.window');
      ox = e.clientX - dragged.offsetLeft; oy = e.clientY - dragged.offsetTop;
      dragged.style.zIndex = ++zIndex;
      const appId = dragged.id.replace('win-', '');
      focusAppWindow(appId);
    });
    document.addEventListener('mousemove', e => {
      if (dragged && !dragged.classList.contains('maximized')) {
        dragged.style.left = (e.clientX - ox) + 'px';
        dragged.style.top = (e.clientY - oy) + 'px';
      }
    });
    document.addEventListener('mouseup', () => dragged = null);
  });
</script>
